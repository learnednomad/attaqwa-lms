# =============================================================================
# Docker CI/CD - AttaqwaMasjid LMS
# =============================================================================
# amd64 builds, GHCR push, Trivy security scanning.
# Triggers on push to dev, main, and version tags.
# Flow: dev (build + deploy to dev) → main (build + deploy to production)
# =============================================================================

name: Docker Build & Push

on:
  push:
    branches: [main, dev, development]
    tags: ["v*"]
    paths:
      - ".github/workflows/docker.yml"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose*.yml"
      - "apps/**"
      - "packages/**"
      - "scripts/**"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main, dev, development]
    paths:
      - ".github/workflows/docker.yml"
      - "Dockerfile"
      - "docker/**"
      - "docker-compose*.yml"
      - "apps/**"
      - "packages/**"
      - "scripts/**"

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and push Docker images
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        target: [api, admin, website, init]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Security scanning with Trivy
  # ---------------------------------------------------------------------------
  scan:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      matrix:
        target: [api, admin, website]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}:${{ steps.tag.outputs.tag }}"
          format: "sarif"
          output: "trivy-${{ matrix.target }}.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-${{ matrix.target }}.sarif"
          category: "trivy-${{ matrix.target }}"

  # ---------------------------------------------------------------------------
  # Deploy to Coolify (dev)
  # ---------------------------------------------------------------------------
  deploy-dev:
    needs: [build, migrations]
    if: github.ref == 'refs/heads/dev' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Deploy to Coolify (dev)
        run: |
          curl -sSf -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_DEV_SERVICE_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

  # ---------------------------------------------------------------------------
  # Deploy to Coolify (development)
  # ---------------------------------------------------------------------------
  deploy-development:
    needs: [build, migrations]
    if: github.ref == 'refs/heads/development' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Deploy to Coolify (development)
        run: |
          curl -sSf -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_DEV2_SERVICE_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

  # ---------------------------------------------------------------------------
  # Deploy to Coolify (production)
  # ---------------------------------------------------------------------------
  deploy-prod:
    needs: [build, scan, migrations]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Coolify (production)
        run: |
          curl -sSf -X GET \
            "${{ secrets.COOLIFY_URL }}/api/v1/services/${{ secrets.COOLIFY_SERVICE_UUID }}/restart" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

  # ---------------------------------------------------------------------------
  # Validate compose configuration
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate base compose
        run: docker compose -f docker-compose.yml config --quiet
        env:
          POSTGRES_PASSWORD: test
          APP_KEYS: k1,k2,k3,k4
          API_TOKEN_SALT: test
          ADMIN_JWT_SECRET: test
          TRANSFER_TOKEN_SALT: test
          ENCRYPTION_KEY: test
          JWT_SECRET: test
          BETTER_AUTH_SECRET: test
          MINIO_ROOT_PASSWORD: test
          STRAPI_API_TOKEN: test

      - name: Validate production compose
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
        env:
          POSTGRES_PASSWORD: test
          APP_KEYS: k1,k2,k3,k4
          API_TOKEN_SALT: test
          ADMIN_JWT_SECRET: test
          TRANSFER_TOKEN_SALT: test
          ENCRYPTION_KEY: test
          JWT_SECRET: test
          BETTER_AUTH_SECRET: test
          MINIO_ROOT_PASSWORD: test
          STRAPI_API_TOKEN: test
          S3_BASE_URL: https://test.example.com
          REDIS_PASSWORD: test

      - name: Validate staging compose
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.staging.yml config --quiet
        env:
          POSTGRES_PASSWORD: test
          APP_KEYS: k1,k2,k3,k4
          API_TOKEN_SALT: test
          ADMIN_JWT_SECRET: test
          TRANSFER_TOKEN_SALT: test
          ENCRYPTION_KEY: test
          JWT_SECRET: test
          BETTER_AUTH_SECRET: test
          MINIO_ROOT_PASSWORD: test
          STRAPI_API_TOKEN: test
          S3_BASE_URL: https://staging.example.com
          REDIS_PASSWORD: test

      - name: Validate dev compose
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml config --quiet
        env:
          POSTGRES_PASSWORD: test
          APP_KEYS: k1,k2,k3,k4
          API_TOKEN_SALT: test
          ADMIN_JWT_SECRET: test
          TRANSFER_TOKEN_SALT: test
          ENCRYPTION_KEY: test
          JWT_SECRET: test
          BETTER_AUTH_SECRET: test
          MINIO_ROOT_PASSWORD: test
          STRAPI_API_TOKEN: test

      - name: Validate monitoring compose
        run: docker compose -f docker-compose.monitoring.yml config --quiet

  # ---------------------------------------------------------------------------
  # Migration smoke test — run BetterAuth migrate against an ephemeral
  # Postgres so a schema change that breaks deploy fails CI, not prod.
  # ---------------------------------------------------------------------------
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: attaqwa_lms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attaqwa_lms
      BETTER_AUTH_SECRET: ci-migrate-secret
      BETTER_AUTH_BASE_URL: http://localhost:3001
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run BetterAuth migrations
        working-directory: apps/website
        run: pnpm exec better-auth migrate --yes

      - name: Re-run migrations (idempotency check)
        working-directory: apps/website
        run: pnpm exec better-auth migrate --yes

      - name: Verify requiresPasswordChange column
        run: |
          psql "$DATABASE_URL" -tAc "SELECT column_name FROM information_schema.columns WHERE table_name='user' AND column_name='requiresPasswordChange';" \
            | grep -q requiresPasswordChange \
            || (echo "FATAL: requiresPasswordChange column missing after migrate" && exit 1)

      - name: Run seed script (dev-only SQL)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed-auth-users.sql

      - name: Re-run seed (idempotency check)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed-auth-users.sql
