name: CI Quality Checks

on:
  pull_request:
    branches: [main, develop, development]
  push:
    branches: [main, develop, development]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  quality-checks:
    name: Code Quality & Type Safety
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type checking
        run: pnpm run type-check

      - name: Run tests (website)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        working-directory: apps/website
        run: pnpm test --ci --maxWorkers=2 --passWithNoTests

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: apps/website/coverage/
          retention-days: 7
          if-no-files-found: ignore

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        run: pnpm run build:admin

      - name: Build website app
        run: pnpm run build:website

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: attaqwa_lms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attaqwa_lms
      # Strapi env — matches apps/api/config defaults
      DATABASE_CLIENT: postgres
      DATABASE_HOST: localhost
      DATABASE_PORT: '5432'
      DATABASE_NAME: attaqwa_lms
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSL: 'false'
      APP_KEYS: k1,k2,k3,k4
      API_TOKEN_SALT: ci-api-token-salt
      ADMIN_JWT_SECRET: ci-admin-jwt-secret
      TRANSFER_TOKEN_SALT: ci-transfer-token-salt
      ENCRYPTION_KEY: ci-encryption-key
      JWT_SECRET: ci-jwt-secret
      # BetterAuth (used by website)
      BETTER_AUTH_SECRET: ci-e2e-secret-not-for-prod-0123456789abcdef
      BETTER_AUTH_BASE_URL: http://localhost:3003
      # Shared URLs
      NEXT_PUBLIC_API_URL: http://localhost:1337
      STRAPI_URL: http://localhost:1337
      NEXT_PUBLIC_AUTH_URL: http://localhost:3003
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3000
      AUTH_INTERNAL_URL: http://localhost:3003
      STRAPI_INTERNAL_URL: http://localhost:1337
      # Test run mode. all-pages.spec.ts and critical-paths.spec both run
      # against the seeded Strapi + BetterAuth stack provisioned below.
      E2E_FULL_STACK: '1'
      PLAYWRIGHT_SKIP_WEBSERVER: '1'
      # Parallel Playwright workers trip BetterAuth's default sign-in rate
      # limit (see apps/website/src/lib/auth.ts); disable it for CI only.
      E2E_DISABLE_RATE_LIMIT: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install postgresql-client (for seed script)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run BetterAuth migrations
        working-directory: apps/website
        run: pnpm exec better-auth migrate --yes

      - name: Seed auth users (idempotent)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed-auth-users.sql

      - name: Install Playwright browsers
        working-directory: apps/website
        run: pnpm exec playwright install --with-deps chromium

      # ────────────────────────────────────────────────────────────────────
      # Build: api (Strapi) first — its NODE_ENV at build time doesn't matter.
      # ────────────────────────────────────────────────────────────────────
      - name: Build api (Strapi)
        run: pnpm --filter api build

      # Start Strapi in production mode for parity with prod deploys.
      # Bootstrap (apps/api/src/bootstrap.ts) still seeds the super-admin,
      # configures permissions, and mints a full-access token in any NODE_ENV.
      # Content (courses/lessons/quizzes) is seeded by an explicit
      # `pnpm --filter api seed:bootstrap` step further down — that script
      # runs against the live HTTP API using STRAPI_API_TOKEN.
      - name: Start api (Strapi) in background
        env:
          NODE_ENV: production
          HOST: 0.0.0.0
          PORT: '1337'
          # Trust X-Forwarded-* on inbound requests so Strapi treats them as
          # TLS-terminated upstream. Required for admin /register-admin and
          # /login under plain-HTTP localhost while NODE_ENV=production.
          STRAPI_PROXY: 'true'
        run: |
          nohup pnpm --filter api start > /tmp/strapi.log 2>&1 &
          echo $! > /tmp/strapi.pid
          echo "Strapi PID=$(cat /tmp/strapi.pid)"

      - name: Wait for Strapi to be reachable
        run: |
          for i in {1..90}; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:1337/_health 2>/dev/null || echo 000)
            if [ "$code" = "204" ] || [ "$code" = "200" ]; then
              echo "Strapi up (HTTP $code) after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Strapi did not become reachable — dumping log:"
          tail -200 /tmp/strapi.log || true
          exit 1

      # ────────────────────────────────────────────────────────────────────
      # CI bootstrap: login as the bootstrap-seeded super-admin and mint a
      # deterministic full-access API token. Exports STRAPI_API_TOKEN to
      # subsequent steps via $GITHUB_ENV.
      # ────────────────────────────────────────────────────────────────────
      - name: Bootstrap Strapi admin + API token
        id: strapi-bootstrap
        run: |
          pnpm --filter api exec tsx scripts/seed/ci-bootstrap.ts > /tmp/ci-bootstrap.out 2>/tmp/ci-bootstrap.err || {
            echo "ci-bootstrap failed"; cat /tmp/ci-bootstrap.err; exit 1;
          }
          # Emit STRAPI_API_TOKEN only — JWT is short-lived and unused downstream.
          grep '^STRAPI_API_TOKEN=' /tmp/ci-bootstrap.out >> "$GITHUB_ENV"
          echo "Bootstrap OK ($(wc -l < /tmp/ci-bootstrap.out) lines)"

      # Seed courses + lessons + quizzes via HTTP. Replaces the in-bootstrap
      # template seed that was gated on `NODE_ENV !== 'production'`. Idempotent:
      # short-circuits when each entity type already has rows.
      - name: Seed Strapi content (courses, lessons, quizzes)
        run: pnpm --filter api seed:bootstrap

      - name: Seed Strapi content (users, enrollments, achievements, ...)
        run: pnpm --filter api exec tsx scripts/seed/seed-complete.ts

      # ────────────────────────────────────────────────────────────────────
      # Build + start website (3003) and admin (3000) now that STRAPI_API_TOKEN
      # is on the env and Strapi has content.
      # ────────────────────────────────────────────────────────────────────
      - name: Build website
        working-directory: apps/website
        run: pnpm build

      - name: Build admin
        working-directory: apps/admin
        run: pnpm build

      - name: Start website (background)
        working-directory: apps/website
        env:
          PORT: '3003'
          NODE_ENV: production
        run: |
          nohup pnpm start > /tmp/website.log 2>&1 &
          echo $! > /tmp/website.pid

      - name: Start admin (background)
        working-directory: apps/admin
        env:
          PORT: '3000'
          NODE_ENV: production
        run: |
          nohup pnpm start > /tmp/admin.log 2>&1 &
          echo $! > /tmp/admin.pid

      - name: Wait for website + admin
        run: |
          for i in {1..90}; do
            w=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:3003/ 2>/dev/null || echo 000)
            a=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo 000)
            echo "[$i] website=$w admin=$a"
            # website: 200 on / (public) ; admin: 200/302/307 (middleware redirect allowed)
            if [ "$w" = "200" ] && { [ "$a" = "200" ] || [ "$a" = "302" ] || [ "$a" = "307" ]; }; then
              echo "Website + admin up"
              exit 0
            fi
            sleep 2
          done
          echo "Services did not become ready — dumping logs"
          echo "--- website.log ---"; tail -200 /tmp/website.log || true
          echo "--- admin.log ---";   tail -200 /tmp/admin.log || true
          exit 1

      - name: Run Playwright E2E tests
        working-directory: apps/website
        run: pnpm exec playwright test --project=chromium

      - name: Stop background services
        if: always()
        run: |
          for pid in /tmp/website.pid /tmp/admin.pid /tmp/strapi.pid; do
            [ -f "$pid" ] && kill "$(cat "$pid")" 2>/dev/null || true
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/website/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload service logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: service-logs
          path: |
            /tmp/website.log
            /tmp/admin.log
            /tmp/strapi.log
            /tmp/ci-bootstrap.out
            /tmp/ci-bootstrap.err
          retention-days: 3
          if-no-files-found: ignore
