name: CI Quality Checks

on:
  pull_request:
    branches: [main, develop, development]
  push:
    branches: [main, develop, development]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  quality-checks:
    name: Code Quality & Type Safety
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm run lint

      - name: Run TypeScript type checking
        run: pnpm run type-check

      - name: Run tests (website)
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        working-directory: apps/website
        run: pnpm test --ci --maxWorkers=2 --passWithNoTests

      - name: Upload test coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: apps/website/coverage/
          retention-days: 7
          if-no-files-found: ignore

  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build admin app
        run: pnpm run build:admin

      - name: Build website app
        run: pnpm run build:website

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: attaqwa_lms
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/attaqwa_lms
      BETTER_AUTH_SECRET: ci-e2e-secret-not-for-prod
      BETTER_AUTH_BASE_URL: http://localhost:3003
      NEXT_PUBLIC_API_URL: http://localhost:1337
      NEXT_PUBLIC_AUTH_URL: http://localhost:3003
      NEXT_PUBLIC_ADMIN_URL: http://localhost:3000
      ADMIN_URL: http://localhost:3000
      NODE_ENV: test
      PLAYWRIGHT_SKIP_WEBSERVER: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install postgresql-client (for seed script)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run BetterAuth migrations
        working-directory: apps/website
        run: pnpm exec better-auth migrate --yes

      - name: Seed auth users (idempotent)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f scripts/seed-auth-users.sql

      - name: Install Playwright browsers
        working-directory: apps/website
        run: pnpm exec playwright install --with-deps chromium

      - name: Build website (standalone output)
        working-directory: apps/website
        run: pnpm build

      - name: Start website (background)
        working-directory: apps/website
        env:
          PORT: '3003'
        run: |
          nohup pnpm start > /tmp/website.log 2>&1 &
          echo $! > /tmp/website.pid

      - name: Wait for website to be reachable
        run: |
          for i in {1..60}; do
            if curl -sSf -o /dev/null http://localhost:3003/; then
              echo "Website is up after ${i} attempt(s)"
              exit 0
            fi
            sleep 2
          done
          echo "Website did not become reachable — dumping log:"
          tail -100 /tmp/website.log || true
          exit 1

      - name: Run Playwright E2E tests
        working-directory: apps/website
        run: pnpm exec playwright test --project=chromium

      - name: Stop website
        if: always()
        run: |
          if [ -f /tmp/website.pid ]; then
            kill "$(cat /tmp/website.pid)" 2>/dev/null || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: apps/website/playwright-report/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload website log (on failure)
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: website-log
          path: /tmp/website.log
          retention-days: 3
          if-no-files-found: ignore
