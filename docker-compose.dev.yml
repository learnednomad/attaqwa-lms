# ============================================================================
# Development Docker Compose - AttaqwaMasjid LMS
# ============================================================================
# Hot-reload enabled for all services.
# Uses bind mounts for live code changes.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# With AI/Ollama:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --profile ai up -d
# ============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: pgvector/pgvector:pg16
    container_name: attaqwa-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: attaqwa_lms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev-password-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Init Container — BetterAuth migrations + seed data
  # Runs every time the dev stack comes up; each step is idempotent.
  # --------------------------------------------------------------------------
  init:
    image: node:22-alpine
    container_name: attaqwa-init-dev
    restart: "no"
    working_dir: /app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev-password-change-me}@postgres:5432/attaqwa_lms
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: postgres
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me}
      BETTER_AUTH_BASE_URL: ${BETTER_AUTH_BASE_URL:-http://localhost:3003}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -eu -c "
        apk add --no-cache postgresql16-client > /dev/null;
        npm install -g pnpm@10.12.3 > /dev/null;
        pnpm install --frozen-lockfile;
        echo '=== [1/3] Running BetterAuth migrations ===';
        cd apps/website && pnpm exec better-auth migrate --yes;
        cd /app;
        echo '=== [2/3] Seeding default user accounts ===';
        psql \"$$DATABASE_URL\" -v ON_ERROR_STOP=1 -f scripts/seed-auth-users.sql;
        echo '=== [3/3] Checking legacy Strapi user migration ===';
        STRAPI_EXISTS=$$(psql \"$$DATABASE_URL\" -tAc \"SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_name = 'up_users');\" 2>/dev/null || echo f);
        if [ \"$$STRAPI_EXISTS\" = 't' ]; then
          UNMIGRATED=$$(psql \"$$DATABASE_URL\" -tAc \"SELECT COUNT(*) FROM up_users u WHERE NOT EXISTS (SELECT 1 FROM \\\"user\\\" ba WHERE ba.email = u.email);\" 2>/dev/null || echo 0);
          if [ \"$$UNMIGRATED\" -gt 0 ]; then
            echo \"  Migrating $$UNMIGRATED legacy Strapi users...\";
            node --import tsx scripts/migrate-users-to-betterauth.ts;
          else
            echo '  All Strapi users already migrated.';
          fi;
        else
          echo '  No Strapi up_users table found — skipping.';
        fi;
        echo '=== Init complete ==='
      "

  # MinIO - S3-compatible object storage (Development)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: attaqwa-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-attaqwa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: attaqwa-minio-init-dev
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set attaqwa http://minio:9000 $${MINIO_ROOT_USER:-attaqwa} $${MINIO_ROOT_PASSWORD:-dev-minio-password} &&
        mc mb --ignore-existing attaqwa/uploads-public &&
        mc anonymous set download attaqwa/uploads-public &&
        echo 'MinIO bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-attaqwa}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev-minio-password}

  # Strapi Backend API (Development with hot-reload)
  api:
    image: node:22-alpine
    container_name: attaqwa-api-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@10.12.3 && pnpm install && cd apps/api && npm install --os=linux --libc=musl sharp && pnpm develop"
    environment:
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: attaqwa_lms
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-dev-password-change-me}
      DATABASE_SSL: "false"
      APP_KEYS: ${APP_KEYS:-dev-key1,dev-key2,dev-key3,dev-key4}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-dev-api-token-salt}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-dev-admin-jwt-secret}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-dev-transfer-token-salt}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-dev-encryption-key}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      NODE_ENV: development
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mistral:7b-instruct-q4_K_M}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-120000}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-false}
      OLLAMA_MAX_PARALLEL: ${OLLAMA_MAX_PARALLEL:-2}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-768}
      # MinIO / S3 upload configuration
      UPLOAD_PROVIDER: aws-s3
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-attaqwa}
      S3_ACCESS_SECRET: ${MINIO_ROOT_PASSWORD:-dev-minio-password}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: uploads-public
      S3_BASE_URL: http://localhost:9000/uploads-public
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
      init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - /app/node_modules
      - api_uploads_dev:/app/apps/api/public/uploads

  # Admin Portal (Development with hot-reload)
  admin:
    image: node:22-alpine
    container_name: attaqwa-admin-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@10.12.3 && pnpm install && cd apps/admin && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:1337
      NEXT_PUBLIC_AUTH_URL: http://localhost:3003
      AUTH_INTERNAL_URL: http://website:3003
      STRAPI_INTERNAL_URL: http://api:1337
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/admin/.next

  # Website (Development with hot-reload)
  website:
    image: node:22-alpine
    container_name: attaqwa-website-dev
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install -g pnpm@10.12.3 && pnpm install && cd apps/website && pnpm dev"
    environment:
      NODE_ENV: development
      PORT: 3003
      NEXT_PUBLIC_API_URL: http://localhost:1337
      STRAPI_URL: http://api:1337
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-dev-password-change-me}@postgres:5432/attaqwa_lms
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-secret-change-me}
      BETTER_AUTH_BASE_URL: http://localhost:3003
      STRAPI_API_TOKEN: ${STRAPI_API_TOKEN:-}
    ports:
      - "3003:3003"
    depends_on:
      init:
        condition: service_completed_successfully
      api:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/website/.next

  # Ollama - Local LLM Inference (optional, use --profile ai)
  ollama:
    image: ollama/ollama
    container_name: attaqwa-ollama-dev
    restart: unless-stopped
    profiles: ["ai"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_dev:/root/.ollama
    environment:
      OLLAMA_MAX_LOADED_MODELS: 1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # Ollama Model Setup (init container - pulls required models)
  ollama-setup:
    image: curlimages/curl:8.7.1
    container_name: attaqwa-ollama-setup
    profiles: ["ai"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Pulling generation model: ${OLLAMA_MODEL:-mistral:7b-instruct-q4_K_M}..."
        curl -sf http://ollama:11434/api/pull -d "{\"name\":\"${OLLAMA_MODEL:-mistral:7b-instruct-q4_K_M}\"}" || echo "Model pull failed (may already exist)"
        echo "Pulling embedding model: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}..."
        curl -sf http://ollama:11434/api/pull -d "{\"name\":\"${OLLAMA_EMBED_MODEL:-nomic-embed-text}\"}" || echo "Embed model pull failed (may already exist)"
        echo "Model setup complete."

volumes:
  postgres_data_dev:
    driver: local
  api_uploads_dev:
    driver: local
  minio_data_dev:
    driver: local
  ollama_data_dev:
    driver: local
